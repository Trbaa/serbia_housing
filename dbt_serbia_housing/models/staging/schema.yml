version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: halo_oglasi
      - name: z4ida
      - name: nekretnine_rs

models:
  - name: stg_oglasi
    description: >
      Silver layer. Deterministic 1:1 cleaning of raw Halo Oglasi listings:
      type casting, number extraction, value normalization, description scrub.
    columns:
      - name: oglas_id
        tests:
          - not_null
      - name: tip_nekretnine
        tests:
          - accepted_values:
              arguments:
                values: ['stan', 'kuća']
              config:
                where: "tip_nekretnine is not null"

seeds:
  - name: lokacije
    description: > 
      252 Belgrade municipalities, neighborhoods, blocks, and named
      developments. lokacija_norm is lowercased with Serbian diacritics
      stripped, used for regex word-boundary matching.
    columns:
    - name: lokacija_norm
      tests: [unique]